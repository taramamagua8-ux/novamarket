<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Información del Locatario</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;

    background:linear-gradient(
    135deg,
    #edf2f7,
    #dde7f0,
    #e9edf5,
    #f5f7fa
    );
}

.contenedor{
    width:100%;
    max-width:1400px;
    min-height:760px;

    display:flex;

    border-radius:35px;
    overflow:hidden;

    background:white;

    box-shadow:
    0 20px 50px rgba(0,0,0,.12);
}

/* PANEL IZQUIERDO */

.panel-info{
    width:30%;

    position:relative;
    overflow:hidden;

    background:linear-gradient(
    180deg,
    #a50000,
    #d50000,
    #ff5f5f
    );

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    padding:30px;
}

/* CIRCULO */

.circulo{
    width:550px;
    height:550px;

    position:absolute;

    top:-280px;
    left:-280px;

    border-radius:50%;

    background:radial-gradient(
    circle,
    #ff8a80,
    #ff5252,
    #c00000
    );

    border:12px solid rgba(255,255,255,.8);

    box-shadow:
    0 0 40px rgba(255,255,255,.4);
}

.descripcion{
    margin-top:250px;

    color:white;

    text-align:center;

    font-size:24px;
    font-weight:600;

    max-width:280px;

    z-index:2;
}

.btn-volver{

    margin-top:40px;

    padding:15px 45px;

    border:none;
    border-radius:15px;

    background:white;

    color:#d50000;

    font-size:18px;
    font-weight:700;

    cursor:pointer;

    transition:.3s;

    z-index:2;
}

.btn-volver:hover{
    transform:scale(1.05);
}

/* FORMULARIO */

.formulario{
    width:70%;

    padding:40px;

    background:linear-gradient(
    135deg,
    #f7f9fc,
    #eef3f8,
    #e8eef5
    );
}

.formulario h2{
    text-align:center;

    color:#2f3d4f;

    font-size:38px;

    margin-bottom:30px;
}

.input-box{
    margin-bottom:18px;

    background:#ffffff;

    padding:8px;

    border-radius:20px;

    border:2px solid #d7e3f1;

    box-shadow:
    0 4px 12px rgba(0,0,0,.05);
}

.input-box input{
    width:100%;

    padding:18px;

    border:none;

    outline:none;

    border-radius:15px;

    background:#f8fbff;

    font-size:16px;
}

.input-box input::placeholder{
    color:#7a7a7a;
}

/* BOTONES */

.botones{
    display:flex;
    justify-content:center;
    gap:20px;

    flex-wrap:wrap;

    margin-top:25px;
}

.btn{
    padding:15px 40px;

    border:none;
    border-radius:15px;

    color:white;

    font-size:17px;
    font-weight:600;

    cursor:pointer;

    transition:.3s;
}

.btn:hover{
    transform:translateY(-4px);
}

.guardar{
    background:linear-gradient(
    135deg,
    #00c853,
    #43e97b
    );
}

.limpiar{
    background:linear-gradient(
    135deg,
    #ff9800,
    #ffb74d
    );
}

.enviar{
    background:linear-gradient(
    135deg,
    #2196f3,
    #64b5f6
    );
}

/* RESPONSIVE */

@media(max-width:900px){

    .contenedor{
        flex-direction:column;
    }

    .panel-info,
    .formulario{
        width:100%;
    }

    .descripcion{
        margin-top:180px;
    }

}

</style>
</head>

<body>

<div class="contenedor">

    <div class="panel-info">

        <div class="circulo"></div>

        <p class="descripcion">
            Conoce todos los locatarios del Mercado Melchor Ocampo
        </p>

        <button class="btn-volver">
            Volver
        </button>

    </div>

    <div class="formulario">

        <h2>Información del Locatario</h2>

        <div class="input-box">
            <input type="text" placeholder="Nombre del Local">
        </div>

        <div class="input-box">
            <input type="text" placeholder="Nombre del Locatario">
        </div>

        <div class="input-box">
            <input type="text" placeholder="Número de Local">
        </div>

        <div class="input-box">
            <input type="text" placeholder="Giro Comercial">
        </div>

        <div class="input-box">
            <input type="text" placeholder="Teléfono">
        </div>

        <div class="input-box">
            <input type="email" placeholder="Correo Electrónico">
        </div>

        <div class="input-box">
            <input type="text" placeholder="Descripción del Negocio">
        </div>

        <div class="botones">

            <button class="btn guardar">
                Guardar
            </button>

            <button class="btn limpiar">
                Limpiar
            </button>

            <button class="btn enviar">
                Enviar
            </button>

        </div>

    </div>

</div>

</body>
</html>
