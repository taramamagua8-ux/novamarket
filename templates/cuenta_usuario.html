<!DOCTYPE html>
<html lang="es">

<head>

    <link rel="icon"
          type="image/png"
          href="{{ url_for('static', filename='img/NovamarketLogoDEFINITIVO.png') }}">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Mi Cuenta | NovaMarket</title>

    <style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

@keyframes luzMovil{
    0%{
        background-position:0% 0%;
    }

    50%{
        background-position:100% 100%;
    }

    100%{
        background-position:0% 0%;
    }
}

body{
    min-height:100vh;

    background:
    radial-gradient(circle at center,
    #bd122e 0%,
    rgb(41,103,164) 70%);

    background-size:200% 200%;

    animation:luzMovil 20s ease-in-out infinite;

    color:white;
}

.navbar{
    width:100%;
    height:100px;

    backdrop-filter:blur(20px);

    background:rgba(255,255,255,.08);

    border-bottom:1px solid rgba(255,255,255,.15);

    display:flex;
    align-items:center;
    justify-content:center;
}

.navbar h1{
    font-size:2rem;
}

.contenedor{
    width:95%;
    max-width:1400px;

    margin:auto;
    padding:40px 0;
}

.panel{
    background:rgba(255,255,255,.10);

    backdrop-filter:blur(20px);

    border:1px solid rgba(255,255,255,.15);

    border-radius:30px;

    padding:30px;

    box-shadow:
    0 10px 40px rgba(0,0,0,.25);
}

.perfil{
    text-align:center;
    margin-bottom:40px;
}

.perfil img{
    width:180px;
    height:180px;
    object-fit:cover;
    border-radius:50%;
    border:5px solid white;
    background:white;
    padding:8px;
    box-shadow:0 0 30px rgba(255,255,255,.3);
    transition:.4s;
}

.perfil img:hover{
    transform:scale(1.05);
}

.perfil h2{
    margin-top:15px;
    font-size:2rem;
}

.botones-foto{
    margin-top:20px;

    display:flex;
    justify-content:center;
    gap:15px;
    flex-wrap:wrap;
}

.btn{
    border:none;

    padding:12px 22px;

    border-radius:50px;

    color:white;

    cursor:pointer;

    font-weight:bold;

    transition:.3s;
}

.btn:hover{
    transform:translateY(-3px);
}

.subir{
    background:#27ae60;
}

.editar{
    background:#f39c12;
}

.borrar{
    background:#e74c3c;
}

.formulario{
    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(300px,1fr));

    gap:20px;
}

.campo{
    display:flex;
    flex-direction:column;
}

.campo label{
    margin-bottom:8px;
    font-weight:bold;
}

.campo input,
.campo select{
    padding:15px;

    border:none;

    border-radius:15px;

    outline:none;

    background:rgba(255,255,255,.15);

    color:white;
}

.campo input::placeholder{
    color:rgba(255,255,255,.7);
}

.seccion{
    margin-top:40px;
}

.seccion h3{
    margin-bottom:20px;

    font-size:1.5rem;
}

.tarjetas{
    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(250px,1fr));

    gap:20px;
}

.tarjeta{
    background:rgba(255,255,255,.12);

    border-radius:25px;

    padding:20px;

    text-align:center;
}

.tarjeta h4{
    margin-bottom:10px;
}

.guardar{
    width:100%;

    margin-top:40px;

    padding:18px;

    border:none;

    border-radius:20px;

    font-size:1.1rem;

    font-weight:bold;

    cursor:pointer;

    background:
    linear-gradient(
    135deg,
    #ff416c,
    #3b82f6);

    color:white;
}

.guardar:hover{
    transform:scale(1.02);
}

.volver{
    margin-top:20px;

    width:100%;

    padding:15px;

    border:none;

    border-radius:20px;

    cursor:pointer;

    background:white;

    color:#222;

    font-weight:bold;
}

.btn-regresar{
    position:fixed;
    top:20px;
    left:20px;
    width:60px;
    height:60px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    text-decoration:none;
    color:white;
    font-size:2rem;
    font-weight:bold;
    background:rgba(255,255,255,.15);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,.2);
    z-index:9999;
    transition:.3s;
}

.btn-regresar:hover{
    transform:scale(1.1);
    background:rgba(255,255,255,.25);
}
    </style>

</head>

<body>
    <a href="{{ url_for('menu') }}" class="btn-regresar">
    ←
    </a>

<div class="navbar">
    <h1>Mi Cuenta</h1>
</div>

<div class="contenedor">

    <div class="panel">

        <div class="perfil">
{% if cliente.foto %}
<img id="vistaPerfil"
src="{{ url_for('static', filename='fotos_perfil/' + cliente.foto) }}">
{% else %}
<img id="vistaPerfil"
src="{{ url_for('static', filename='img/NovamarketLogoDEFINITIVO.png') }}">
{% endif %}
                <h2 id="nombreVista">
                    Usuario NovaMarket
                </h2>

                <div class="botones-foto">

                    <label for="fotoPerfil"
                        class="btn subir">
                        Subir Foto
                    </label>

                    <button class="btn editar"
                        id="editarFoto">
                    Editar Foto
                </button>

                <button class="btn borrar"
                        id="borrarFoto">
                    Borrar Foto
                </button>

            </div>

           <form action="{{ url_for('subir_foto') }}"
      method="POST"
      enctype="multipart/form-data"
      id="formFoto">

    <input type="file"
           id="fotoPerfil"
           name="foto"
           accept="image/*"
           hidden>

</form>

        </div>

    <form action="{{ url_for('actualizar_cliente') }}" method="POST">

    <div class="formulario">


            <div class="campo">
              <label>Nombre</label>
                <input type="text"
                id="nombre"
                name="usuario"
                value="{{ cliente.usuario }}">
            </div>      

            <div class="campo">
            <label>Correo</label>
            <input type="email"
                name="correo"
                value="{{ cliente.correo }}">
            </div>

            <div class="campo">
            <label>Teléfono</label>
            <input type="tel"
                name="telefono"
                value="{{ cliente.telefono }}">
            </div>

            <div class="campo">
            <label>Colonia o Barrio</label>
            <input type="text"
                name="colonia_barrio"
                value="{{ cliente.colonia_barrio }}">
            </div>

        </div>

       <button type="submit" class="guardar">
            Guardar Cambios
        </button>

        
</form>
    </div>

</div>

<script>

const fotoPerfil =
document.getElementById("fotoPerfil");

const vistaPerfil =
document.getElementById("vistaPerfil");

const borrarFoto =
document.getElementById("borrarFoto");

const nombre =
document.getElementById("nombre");

const nombreVista =
document.getElementById("nombreVista");
const editarFoto =
document.getElementById("editarFoto");
editarFoto.addEventListener("click",()=>{

    fotoPerfil.click();

});

fotoPerfil.addEventListener("change",()=>{

    document.getElementById("formFoto").submit();


    const archivo =
    e.target.files[0];

    if(!archivo) return;

    const lector =
    new FileReader();

    lector.onload=function(evento){

        vistaPerfil.src =
        evento.target.result;

    };

    lector.readAsDataURL(archivo);

});

borrarFoto.addEventListener("click",()=>{

    vistaPerfil.src =
    "{{ url_for('static', filename='img/NovamarketLogoDEFINITIVO.png') }}";

    fotoPerfil.value="";

});


nombre.addEventListener("input",()=>{

    if(nombre.value.trim()!=""){
        nombreVista.textContent=
        nombre.value;
    }
    else{
        nombreVista.textContent=
        "Usuario NovaMarket";
    }

});

</script>

</body>
</html>
